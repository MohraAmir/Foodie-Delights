<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <title>foodie Delights</title>
    <link rel="stylesheet" href="style.css">

</head>
<body>
    <div class="Left-Half"> <!-- Left Half -->
        <div class="img">
            <img src="burger.jpg" alt="Burger">
        </div> 
            <div class="welcome"> <!-- Welcome -->
        <h1>Welcome Back !</h1>
                <p>
                    Indulge your taste buds at Foodie Delights, 
                    where every flavor tells a delicious story.
                     Welcome to a culinary journey like no other!
                </p>
        </div> <!-- Welcome -->
    </div><!-- Left Half -->

    <div class="Right-Half"> <!-- Right Half -->

       <div class="title-subtitle"> <!-- Title-Subtitle -->
         <h1 class="title">Foodie Delights</h1>
        <h1 class="subtitle">Create Account</h1>
         </div> <!-- Title-Subtitle -->

        <div class="input"> <!-- Input -->
        <input type="text" placeholder="Username">
        <input type="email" placeholder="Email">
        <input type="password" placeholder="Password">
        <button class="btn">Create Account</button>
        <div class="Done"> <!-- Done -->
        <p>Already have an account?
             <a href="#">Login</a></p>
    </div> <!-- Done --> 
    <div class="social">
                <button class="social-f">f</button>
                <button class="social-G">G</button>
            </div>
        </div> <!-- Input -->
        
    </div>

</body>
</html>
